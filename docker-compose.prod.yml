version: '3.8'

services:
  app:
    build: .
    expose:
      - "3000"
    env_file:
      - .env
    volumes:
      - ./media:/app/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - app

  ghost_db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${GHOST_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${GHOST_MYSQL_DATABASE:-ghost}
      MYSQL_USER: ${GHOST_MYSQL_USER:-ghost}
      MYSQL_PASSWORD: ${GHOST_MYSQL_PASSWORD}
    volumes:
      - ghost_db_data:/var/lib/mysql

  ghost:
    image: ghost:5-alpine
    restart: unless-stopped
    depends_on:
      - ghost_db
    environment:
      url: ${GHOST_URL:-http://localhost:2368}
      database__client: mysql2
      database__connection__host: ghost_db
      database__connection__user: ${GHOST_MYSQL_USER:-ghost}
      database__connection__password: ${GHOST_MYSQL_PASSWORD}
      database__connection__database: ${GHOST_MYSQL_DATABASE:-ghost}
    ports:
      - "2368:2368"
    volumes:
      - ghost_content:/var/lib/ghost/content

volumes:
  media:
  caddy_data:
  caddy_config:
  ghost_db_data:
  ghost_content:
